<ion-header>
  <ion-toolbar>
    <ion-title>Trophy cabinet</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="stats-row">
    <div class="stat-card">
      <p class="stat-val">{{ earnedCount }}</p>
      <p class="stat-lbl">Earned</p>
    </div>
    <div class="stat-card">
      <p class="stat-val">{{ lockedCount }}</p>
      <p class="stat-lbl">Locked</p>
    </div>
    <div class="stat-card">
      <p class="stat-val">{{ completionPct }}%</p>
      <p class="stat-lbl">Complete</p>
    </div>
  </div>

  <div class="filter-row">
    <ion-chip
      *ngFor="let f of filters"
      [class.active]="activeFilter === f"
      (click)="activeFilter = f">
      <ion-label>{{ f }}</ion-label>
    </ion-chip>
  </div>

  <div class="trophy-grid">
    <div
      *ngFor="let trophy of filteredTrophies"
      class="trophy-card"
      [class.unlocked]="trophy.unlocked"
      [class.locked]="!trophy.unlocked">

      <div
        class="trophy-icon"
        [style.background]="trophy.unlocked ? trophy.bg : ''">
        <svg *ngIf="trophy.unlocked"
             width="28" height="34" viewBox="0 0 28 34">
          <rect x="8" y="20" width="12" height="8" rx="2"
                [attr.fill]="trophy.fg" opacity="0.7"/>
          <rect x="5" y="28" width="18" height="4" rx="2"
                [attr.fill]="trophy.fg" opacity="0.5"/>
          <path d="M4 4 Q4 18 14 20 Q24 18 24 4 Z"
                [attr.fill]="trophy.fg"/>
          <path d="M4 4 Q0 4 0 9 Q0 15 6 16"
                fill="none" [attr.stroke]="trophy.fg"
                stroke-width="2.5" stroke-linecap="round"/>
          <path d="M24 4 Q28 4 28 9 Q28 15 22 16"
                fill="none" [attr.stroke]="trophy.fg"
                stroke-width="2.5" stroke-linecap="round"/>
          <text
            x="14" y="13"
            text-anchor="middle"
            dominant-baseline="central"
            [attr.font-size]="trophy.icon.length > 1 ? 7 : 9"
            font-weight="500"
            fill="white">{{ trophy.icon }}</text>
        </svg>
        <div *ngIf="!trophy.unlocked" class="lock-icon">
          <div class="lock-arch"></div>
          <div class="lock-body"></div>
        </div>
      </div>

      <p class="trophy-name">{{ trophy.name }}</p>
      <p class="trophy-desc">{{ trophy.desc }}</p>
      <span
        class="trophy-tag"
        [class.tag-tier]="trophy.unlocked && trophy.type === 'tier'"
        [class.tag-streak]="trophy.unlocked && trophy.type === 'streak'"
        [class.tag-start]="trophy.unlocked && trophy.type === 'start'"
        [class.tag-locked]="!trophy.unlocked">
        {{ trophy.unlocked ? trophy.type : 'locked' }}
      </span>

    </div>
  </div>

</ion-content>
