<svg [attr.width]="size" [attr.height]="size * 1.5"
         viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">

      <g *ngIf="isRainbow">
        <circle cx="100" cy="150" r="90" [attr.fill]="rainbowColour" opacity="0.15"/>
      </g>

      <ellipse cx="100" cy="275" rx="38" ry="10" fill="#00000015"/>

      <rect [attr.fill]="legColour" x="78"  y="195" width="16" height="50" rx="7"/>
      <rect [attr.fill]="legColour" x="106" y="195" width="16" height="50" rx="7"/>

      <g *ngIf="hasCape">
        <path d="M68 138 Q40 190 55 240 Q68 210 100 205
                 Q132 210 145 240 Q160 190 132 138Z"
              fill="#D4537E" opacity="0.85"/>
      </g>

      <rect [attr.fill]="torsoColour" x="68"  y="125" width="64" height="78" rx="12"/>
      <rect [attr.fill]="armColour"   x="42"  y="129" width="22" height="58" rx="10"/>
      <rect [attr.fill]="armColour"   x="136" y="129" width="22" height="58" rx="10"/>

      <g *ngIf="hasShield">
        <rect x="22" y="145" width="26" height="32" rx="5"
              fill="#EF9F27" stroke="#BA7517" stroke-width="1"/>
        <path d="M35 152 L35 170 M28 161 L42 161"
              stroke="#BA7517" stroke-width="1.5" fill="none"/>
      </g>

      <g *ngIf="hasSword">
        <rect x="152" y="120" width="6"  height="60" rx="3" fill="#B4B2A9"/>
        <rect x="144" y="175" width="22" height="6"  rx="3" fill="#EF9F27"/>
        <rect x="154" y="178" width="4"  height="14" rx="2" fill="#F5C4B3"/>
      </g>

      <circle cx="100" cy="68" r="36" fill="#F5C4B3"/>
      <ellipse cx="88"  cy="74" rx="4" ry="5" fill="#3d2a1a" opacity="0.7"/>
      <ellipse cx="112" cy="74" rx="4" ry="5" fill="#3d2a1a" opacity="0.7"/>
      <path d="M90 88 Q100 96 110 88"
            stroke="#3d2a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

      <g *ngIf="hasHelm">
        <rect [attr.fill]="helmColour"  x="64" y="34" width="72" height="28" rx="14"/>
        <rect [attr.fill]="visorColour" x="72" y="46" width="56" height="14" rx="7"/>
      </g>

    </svg>
